<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cyber Safety Bot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="chatbox">
    <h2>Cyber Safety Bot</h2>

    <div id="chat">

</div>

<script src="script.js"></script>
</body>
</html>
